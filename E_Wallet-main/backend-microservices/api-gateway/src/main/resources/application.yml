server:
  port: 8080

spring:
  application:
    name: api-gateway
  devtools:
    restart:
      enabled: true
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-signup
          uri: lb://auth-service
          predicates:
            - Path=/signup
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**,/admin/**
        - id: wallet-accounts
          uri: lb://wallet-service
          predicates:
            - Path=/accounts/**
        - id: wallet-balance
          uri: lb://wallet-service
          predicates:
            - Path=/wallet/balance
        - id: transaction-wallet
          uri: lb://wallet-service
          predicates:
            - Path=/wallet/add,/wallet/add-from-account,/wallet/withdraw,/wallet/transfer/**
        - id: transaction-history
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

security:
  jwt:
    secret: ${JWT_SECRET:ewallet-secret-key-for-jwt-signing-12345}

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    health:
      show-details: always
