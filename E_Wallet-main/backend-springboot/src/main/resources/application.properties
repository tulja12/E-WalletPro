server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/ewallet_db
spring.datasource.username=TEAM_A
spring.datasource.password=TEAM_A_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.admin.username=admin
app.admin.password=admin123
app.admin.email=admin@ewallet.local

app.mail.from=${APP_MAIL_FROM:no-reply@ewallet.local}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
