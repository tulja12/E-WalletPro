server:
  port: 8084

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_TRANSACTION_DB:ewallet_transaction}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:TEAM_A}
    password: ${MYSQL_PASSWORD:TEAM_A_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  activemq:
    broker-url: tcp://${ACTIVEMQ_HOST:localhost}:${ACTIVEMQ_PORT:61616}
    user: ${ACTIVEMQ_USERNAME:}
    password: ${ACTIVEMQ_PASSWORD:}
  devtools:
    restart:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

security:
  jwt:
    secret: ${JWT_SECRET:ewallet-secret-key-for-jwt-signing-12345}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
